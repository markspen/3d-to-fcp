name: ThreeDtoFCP

options:
  deploymentTarget:
    macOS: "14.0"
  xcodeVersion: "16.0"
  bundleIdPrefix: com.markspencer
  createIntermediateGroups: true

targets:
  ThreeDtoFCP:
    type: application
    platform: macOS
    deploymentTarget: "14.0"

    sources:
      - path: Sources
        type: group
      - path: Assets.xcassets
      - path: _Placeholder.moti
        buildPhase: resources
        type: file
      - path: PrivacyInfo.xcprivacy
        buildPhase: resources
        type: file
      - path: Ripple_logo_T.png
        buildPhase: resources
        type: file

    entitlements:
      path: ThreeDtoFCP.entitlements
      properties:
        com.apple.security.app-sandbox: true
        com.apple.security.files.user-selected.read-only: true
        com.apple.security.files.bookmarks.app-scope: true
        com.apple.security.assets.movies.read-write: true

    info:
      path: ThreeDtoFCP/Info.plist
      properties:
        CFBundleName: "3D to FCP"
        CFBundleDisplayName: "3D to FCP"
        CFBundleIdentifier: com.markspencer.ThreeDtoFCP
        CFBundleShortVersionString: "1.0"
        CFBundleVersion: "1"
        LSMinimumSystemVersion: "14.0"
        NSHumanReadableCopyright: "© 2026 Mark Spencer"
        CFBundleIconName: AppIcon
        LSApplicationCategoryType: public.app-category.video
        ITSAppUsesNonExemptEncryption: false
        NSPrincipalClass: NSApplication
        NSSupportsAutomaticTermination: false
        NSSupportsSuddenTermination: false

    dependencies:
      - sdk: QuickLookThumbnailing.framework

    scheme:
      testTargets:
        - ThreeDtoFCPTests
      gatherCoverageData: false

    settings:
      base:
        PRODUCT_NAME: "3D to FCP"
        PRODUCT_MODULE_NAME: ThreeDtoFCP
        PRODUCT_BUNDLE_IDENTIFIER: com.markspencer.ThreeDtoFCP
        MARKETING_VERSION: "1.0"
        CURRENT_PROJECT_VERSION: "1"
        SWIFT_VERSION: "5.10"
        MACOSX_DEPLOYMENT_TARGET: "14.0"
        CODE_SIGN_STYLE: Automatic
        DEVELOPMENT_TEAM: 56S86LMNZ6
        ENABLE_HARDENED_RUNTIME: YES
        COMBINE_HIDPI_IMAGES: YES
      configs:
        Debug:
          SWIFT_OPTIMIZATION_LEVEL: "-Onone"
          SWIFT_ACTIVE_COMPILATION_CONDITIONS: DEBUG
          ENABLE_TESTABILITY: YES
        Release:
          SWIFT_OPTIMIZATION_LEVEL: "-O"
          ENABLE_TESTABILITY: NO

  ThreeDtoFCPTests:
    type: bundle.unit-test
    platform: macOS
    deploymentTarget: "14.0"
    sources:
      - path: Tests
    dependencies:
      - target: ThreeDtoFCP
    settings:
      base:
        PRODUCT_NAME: ThreeDtoFCPTests
        PRODUCT_BUNDLE_IDENTIFIER: com.markspencer.ThreeDtoFCPTests
        SWIFT_VERSION: "5.10"
        MACOSX_DEPLOYMENT_TARGET: "14.0"
        GENERATE_INFOPLIST_FILE: YES
        CODE_SIGN_STYLE: Automatic
        DEVELOPMENT_TEAM: 56S86LMNZ6
        TEST_HOST: "$(BUILT_PRODUCTS_DIR)/3D to FCP.app/Contents/MacOS/3D to FCP"
        BUNDLE_LOADER: "$(TEST_HOST)"
